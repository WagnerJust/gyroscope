name: release
# Cuts a GitHub Release with cross-platform archives when a v* tag is pushed.
# Nothing runs until a tag exists — `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ['v*']
permissions:
  contents: write   # goreleaser creates the Release + uploads archives
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history + tags for the changelog
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
